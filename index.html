<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Illuminate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8eaf0 0%, #d6d8e0 100%);
      font-family: 'Georgia', serif;
    }
    .card {
      background: white;
      padding: 80px 100px;
      border-radius: 8px;
      text-align: center;
      max-width: 700px;
      width: 90%;
    }
    h1 {
      font-size: 3.5rem;
      color: #3a3f4a;
      font-weight: normal;
      margin-bottom: 28px;
    }
    p {
      font-size: 1rem;
      color: #7a8090;
      margin-bottom: 20px;
      font-family: 'Arial', sans-serif;
    }
    a {
      color: #7a8090;
      text-decoration: none;
      font-family: 'Arial', sans-serif;
      font-size: 1rem;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Illuminate</h1>
    <p>Strategic growth solutions for CPG companies.</p>
    <a href="mailto:hello@illuminatemkt.com">hello@illuminatemkt.com</a>
  </div>
</body>
</html>
